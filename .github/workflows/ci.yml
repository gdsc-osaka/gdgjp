name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [accounts, tinyurl, wiki, gdg-lib]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @gdgjp/${{ matrix.app }} typecheck

  test:
    name: Unit tests (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [accounts, tinyurl, wiki, gdg-lib]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @gdgjp/${{ matrix.app }} test

  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [accounts, tinyurl, wiki]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @gdgjp/${{ matrix.app }} build

  e2e:
    name: E2E (${{ matrix.app }})
    runs-on: ubuntu-latest
    environment: Development
    strategy:
      matrix:
        app: [accounts, tinyurl, wiki]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create accounts dev vars
        run: |
          cat > accounts/.dev.vars <<EOF
          CLERK_PUBLISHABLE_KEY=${{ vars.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          EOF

          cat > tinyurl/.dev.vars <<EOF
          CLERK_PUBLISHABLE_KEY=${{ vars.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          APP_URL=http://localhost:5174
          ACCOUNTS_URL=http://localhost:5173
          SHORT_URL_BASE=http://localhost:5174
          EOF
      - name: Install Playwright browsers
        run: pnpm --filter @gdgjp/${{ matrix.app }} exec playwright install --with-deps chromium
      - name: Run E2E testing
        run: pnpm --filter @gdgjp/${{ matrix.app }} test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.app }}
          path: "${{ matrix.app }}/playwright-report/"
          retention-days: 7

name = "gdgjp-accounts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "./workers/app.ts"

[alias]
"virtual:react-router/server-build" = "./build/server/index.js"

[vars]
APP_URL = "https://accounts.gdgs.jp"
CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsuZ2Rncy5qcCQ"

[assets]
binding = "ASSETS"
directory = "./build/client"

[[d1_databases]]
binding = "DB"
database_name = "gdgjp-accounts"
database_id = "c97d5ddc-231a-4b1a-af2a-fe753876811d"
migrations_dir = "./migrations"

# [[kv_namespaces]]
# binding = "AUTH_KV"
# id = "TODO"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
